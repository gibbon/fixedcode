apiVersion: '1.0'
kind: spring-domain
metadata:
  name: order-service

spec:
  boundedContext: Order
  service:
    port: 8081
    package: io.example.order
  aggregates:
    Order:
      attributes:
        orderId: uuid
        status: string = Status
      commands:
        - name: CreateOrder
          body: [status]
          emits: OrderCreated
        - name: UpdateOrderStatus
          body: [status]
          emits: OrderStatusUpdated
      queries:
        - name: GetOrder
          returns: Order
        - name: SearchOrder
          returns: PagedOrderList
      events:
        OrderCreated:
          fields: [orderId, status]
      entities:
        LineItem:
          attributes:
            lineItemId: uuid
            orderId: uuid
          commands:
            - name: AddLineItem
              body: [productSku, quantity]
              emits: LineItemAdded
          events:
            LineItemAdded:
              fields: [orderId, lineItemId]
