apiVersion: '1.0'
kind: ts-agent
metadata:
  name: ops-orchestrator

spec:
  mode: orchestrator
  provider: vercel-ai
  agents:
    - name: planner
      prompt: 'You plan the approach...'
      tools: [web-search]
      critical: true
    - name: coder
      prompt: 'You write code...'
      tools: [read-file, write-file]
      critical: true
    - name: reviewer
      prompt: 'You review the output...'
      tools: [read-file]
      critical: false
  routing: sequential
  tools:
    - name: read-file
      type: cli
      config: { command: 'cat' }
    - name: write-file
      type: function
      config: { handler: 'write-file' }
    - name: web-search
      type: http
      config: { baseUrl: 'https://api.search.com' }
  server:
    port: 3200
