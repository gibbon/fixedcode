apiVersion: '1.0'
kind: spring-domain
metadata:
  name: jobs-service

spec:
  boundedContext: Jobs
  service:
    port: 8082
    package: com.example.jobs

  aggregates:
    Job:
      attributes:
        jobId: uuid
        title: string
        status: string = JobStatus
        salary: int
        remote: boolean
        postedDate: localDate
      enumDefaults:
        JobStatus: [DRAFT, PUBLISHED, CLOSED]

    Application:
      attributes:
        applicationId: uuid
        jobId: uuid
        applicantName: string
        score?: double
        appliedAt: instant
