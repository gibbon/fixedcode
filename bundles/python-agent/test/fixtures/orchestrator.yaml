apiVersion: "1.0"
kind: python-agent
metadata:
  name: ops-orchestrator

spec:
  mode: orchestrator
  provider: strands
  streaming: true

  middleware:
    - correlation-id
    - auth:
        provider: auth0
        permission: "admin:query"

  session:
    dev: file
    prod: { provider: s3, bucket: "${ENV}-sessions" }

  agents:
    - name: planner
      prompt: "You are the planning agent..."
      tools: [call-api]
      critical: true
    - name: enricher
      prompt: "You enrich context with data lookups..."
      tools: [query-database]
      critical: false
    - name: executor
      prompt: "You execute approved plans..."
      tools: [run-script, query-database]
      critical: true

  routing: sequential

  tools:
    - name: query-database
      type: database
      config: { readOnly: true, databases: [ops-db] }
    - name: call-api
      type: http
      config: { baseUrl: "https://api.internal" }
    - name: run-script
      type: cli
      config: { command: "kubectl" }
