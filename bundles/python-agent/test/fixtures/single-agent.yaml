apiVersion: '1.0'
kind: python-agent
metadata:
  name: ops-agent

spec:
  mode: single
  provider: strands
  streaming: true
  prompt: 'You are an operations assistant...'

  middleware:
    - correlation-id
    - auth:
        provider: auth0
        permission: 'admin:query'
    - feature-toggles:
        toggleName: opsAgentEnabled

  session:
    dev: file
    prod: { provider: s3, bucket: '${ENV}-sessions' }

  tools:
    - name: query-database
      type: database
      config: { readOnly: true, databases: [ops-db] }
    - name: call-api
      type: http
      config: { baseUrl: 'https://api.internal' }
    - name: run-script
      type: cli
      config: { command: 'kubectl' }
