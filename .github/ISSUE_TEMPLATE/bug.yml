name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal spec or command sequence that reproduces the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        fixedcode --version:
        node --version:
        OS:
