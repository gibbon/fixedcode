name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root tooling
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Install + build engine
        working-directory: engine
        run: |
          npm install --no-audit --no-fund
          npx tsc --noEmit
          npm run build

      - name: Install + build generators (must be built before bundles depend on them)
        run: |
          set -e
          for d in generators/*/; do
            echo "::group::$(basename "$d") install+build"
            (
              cd "$d"
              npm install --no-audit --no-fund
              if grep -q '"build"' package.json; then npm run build; fi
            )
            echo "::endgroup::"
          done

      - name: Install + build bundles
        run: |
          set -e
          for d in bundles/*/; do
            echo "::group::$(basename "$d") install+build"
            (
              cd "$d"
              npm install --no-audit --no-fund
              if grep -q '"build"' package.json; then npm run build; fi
            )
            echo "::endgroup::"
          done

      - name: Test engine
        working-directory: engine
        run: npm test

      - name: Test bundles
        run: |
          set -e
          for d in bundles/*/; do
            echo "::group::$(basename "$d") test"
            (
              cd "$d"
              if grep -q '"test"' package.json; then npm test; fi
            )
            echo "::endgroup::"
          done

      - name: Test generators
        run: |
          set -e
          for d in generators/*/; do
            echo "::group::$(basename "$d") test"
            (
              cd "$d"
              if grep -q '"test"' package.json; then npm test; fi
            )
            echo "::endgroup::"
          done

      - name: Smoke test (generate + verify)
        run: |
          node engine/bin/fixedcode.js generate examples/order-service/order-domain.yaml -o /tmp/smoke
          node engine/bin/fixedcode.js verify examples/order-service/order-domain.yaml /tmp/smoke

      - name: npm audit (engine, advisory)
        working-directory: engine
        run: npm audit --audit-level=high
        continue-on-error: true
