apiVersion: "1.0"
kind: ts-agent
metadata:
  name: coder-agent

spec:
  mode: single
  provider: vercel-ai
  model:
    tier: balanced
  prompt: "You are a coding agent with filesystem access."
  tools:
    - name: read-file
      type: cli
      config: { command: "cat" }
    - name: write-file
      type: function
  server:
    port: 3100
