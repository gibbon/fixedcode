openapi: 3.0.3
info:
  title: OrderManagement Domain API
  version: v1
  description: API for the OrderManagement bounded context
paths:
  /line-items:
    post:
      summary: Add Line Item
      operationId: addLineItem
      tags:
        - LineItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddLineItemRequest'
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineItem'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
  /line-items/by-order-id:
    get:
      summary: Find Line Items By Order Id
      operationId: findLineItemsByOrderId
      tags:
        - LineItem
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineItem'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
  /line-items/{lineItemId}:
    put:
      summary: Update Line Item Quantity
      operationId: updateLineItemQuantity
      tags:
        - LineItem
      parameters:
        - name: lineItemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLineItemQuantityRequest'
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineItem'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
    delete:
      summary: Remove Line Item
      operationId: removeLineItem
      tags:
        - LineItem
      parameters:
        - name: lineItemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
    get:
      summary: Get Line Item
      operationId: getLineItem
      tags:
        - LineItem
      parameters:
        - name: lineItemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineItem'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
  /orders:
    post:
      summary: Create Order
      operationId: createOrder
      tags:
        - Order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
    get:
      summary: Search Orders
      operationId: searchOrders
      tags:
        - Order
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: size
          in: query
          required: false
          schema:
            type: integer
        - name: sort
          in: query
          required: false
          schema:
            type: string
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [ASC, DESC]
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedOrderList'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
  /orders/by-customer-id:
    get:
      summary: Find Orders By Customer Id
      operationId: findOrdersByCustomerId
      tags:
        - Order
      parameters:
        - name: customerId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
  /orders/{orderId}:
    put:
      summary: Update Order Status
      operationId: updateOrderStatus
      tags:
        - Order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
    get:
      summary: Cancel Order
      operationId: cancelOrder
      tags:
        - Order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
    get:
      summary: Get Order
      operationId: getOrder
      tags:
        - Order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Bad request
        '404':
          description: Not found
        '500':
          description: Internal server error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Sort:
      type: object
      properties:
        sorted:
          type: boolean
        unsorted:
          type: boolean
        empty:
          type: boolean
    Pageable:
      type: object
      properties:
        pageNumber:
          type: integer
        pageSize:
          type: integer
        sort:
          $ref: '#/components/schemas/Sort'
        offset:
          type: integer
          format: int64
        paged:
          type: boolean
        unpaged:
          type: boolean
    Order:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        orderDate:
          type: string
          format: date
        status:
          type: string
        totalAmount:
          type: string
        shippingAddress:
          type: object
        billingAddress:
          type: object
    PagedOrderList:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        pageable:
          $ref: '#/components/schemas/Pageable'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        sort:
          $ref: '#/components/schemas/Sort'
        last:
          type: boolean
        first:
          type: boolean
        empty:
          type: boolean
    LineItem:
      type: object
      properties:
        lineItemId:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        quantity:
          type: string
        unitPrice:
          type: string
        subtotal:
          type: string
    CreateOrderRequest:
      type: object
      required:
        - customerId
        - shippingAddress
        - billingAddress
      properties:
        customerId:
          type: string
          format: uuid
        shippingAddress:
          type: string
        billingAddress:
          type: string
    UpdateOrderStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    AddLineItemRequest:
      type: object
      required:
        - productId
        - quantity
        - unitPrice
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: string
        unitPrice:
          type: string
    UpdateLineItemQuantityRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: string
security:
  - bearerAuth: []
